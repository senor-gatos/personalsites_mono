<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="1200" height="630" fill="#180f3a"/>

  <!-- Outer border -->
  <rect x="16" y="16" width="1168" height="598" fill="none" stroke="#c060c8" stroke-width="5"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#3d2475" stroke-width="2"/>

  <!-- Corner decorations -->
  <rect x="16"  y="16"  width="20" height="5"  fill="#F19406"/>
  <rect x="16"  y="16"  width="5"  height="20" fill="#F19406"/>
  <rect x="1164" y="16"  width="20" height="5"  fill="#F19406"/>
  <rect x="1179" y="16"  width="5"  height="20" fill="#F19406"/>
  <rect x="16"   y="609" width="20" height="5"  fill="#F19406"/>
  <rect x="16"   y="594" width="5"  height="20" fill="#F19406"/>
  <rect x="1164" y="609" width="20" height="5"  fill="#F19406"/>
  <rect x="1179" y="594" width="5"  height="20" fill="#F19406"/>

  <!-- Stars scattered -->
  <rect x="520" y="60"  width="6" height="6" fill="#ddb8f0" opacity="0.4"/>
  <rect x="680" y="90"  width="4" height="4" fill="#ddb8f0" opacity="0.3"/>
  <rect x="900" y="55"  width="6" height="6" fill="#ddb8f0" opacity="0.35"/>
  <rect x="1050" y="80" width="4" height="4" fill="#ddb8f0" opacity="0.25"/>
  <rect x="780" y="540" width="4" height="4" fill="#ddb8f0" opacity="0.3"/>
  <rect x="1080" y="520" width="6" height="6" fill="#ddb8f0" opacity="0.35"/>
  <rect x="600" y="555" width="4" height="4" fill="#ddb8f0" opacity="0.25"/>

  <!-- Pixel cat — 6px per pixel, offset (80, 165) -->
  <!-- Hat (amber #F19406) -->
  <rect x="170" y="165" width="72"  height="18" fill="#F19406"/>
  <rect x="170" y="183" width="72"  height="18" fill="#F19406"/>
  <rect x="134" y="201" width="144" height="18" fill="#F19406"/>
  <rect x="170" y="219" width="72"  height="18" fill="#F19406"/>
  <!-- Ears (magenta) -->
  <rect x="116" y="237" width="36" height="36" fill="#c060c8"/>
  <rect x="260" y="237" width="36" height="36" fill="#c060c8"/>
  <!-- Head (magenta) -->
  <rect x="116" y="255" width="180" height="108" fill="#c060c8"/>
  <!-- Eyes (dark) -->
  <rect x="152" y="291" width="36" height="36" fill="#110830"/>
  <rect x="224" y="291" width="36" height="36" fill="#110830"/>
  <!-- Nose -->
  <rect x="170" y="327" width="36" height="18" fill="#7030a0"/>
  <!-- Mouth -->
  <rect x="152" y="345" width="18" height="18" fill="#7030a0"/>
  <rect x="242" y="345" width="18" height="18" fill="#7030a0"/>
  <!-- Chin -->
  <rect x="134" y="345" width="144" height="18" fill="#c060c8"/>

  <!-- Vertical divider -->
  <rect x="400" y="80" width="3" height="470" fill="#3d2475"/>

  <!-- Text section -->
  <!-- SENOR GATOS -->
  <text x="460" y="240" font-family="'Courier New', Courier, monospace" font-size="80" font-weight="bold" fill="#c060c8" letter-spacing="4">SENOR</text>
  <text x="460" y="340" font-family="'Courier New', Courier, monospace" font-size="80" font-weight="bold" fill="#c060c8" letter-spacing="4">GATOS</text>

  <!-- Divider line -->
  <rect x="460" y="360" width="660" height="3" fill="#3d2475"/>

  <!-- Subtitle -->
  <text x="460" y="410" font-family="'Courier New', Courier, monospace" font-size="28" fill="#F19406" letter-spacing="2">THE WORKSHOP</text>

  <!-- Tagline -->
  <text x="460" y="460" font-family="'Courier New', Courier, monospace" font-size="22" fill="#ddb8f0" opacity="0.8">basement artificer &amp; way too distracted engineer</text>

  <!-- URL -->
  <text x="460" y="520" font-family="'Courier New', Courier, monospace" font-size="20" fill="#7030a0" letter-spacing="1">senorgatos.com</text>

  <!-- LED dots at bottom right -->
  <rect x="1080" y="565" width="12" height="12" fill="#00ff88" opacity="0.9"/>
  <rect x="1100" y="565" width="12" height="12" fill="#F19406" opacity="0.85"/>
  <rect x="1120" y="565" width="12" height="12" fill="#B73D6E" opacity="0.9"/>
</svg>
